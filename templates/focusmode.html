<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Mode | Clarity</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            background-color: var(--text-main); /* Dark background for focus */
            color: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
        }

        .task-title {
            color: var(--primary-light);
            font-size: 1.5rem;
            margin-bottom: 40px;
        }

        .timer {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 40px;
            font-variant-numeric: tabular-nums;
        }

        .quote {
            color: var(--text-light);
            font-style: italic;
            margin-top: 60px;
        }

        .banner {
            position: absolute; top:0; left:0; width:100%;
            background-color: var(--primary-color);
            padding: 8px; font-weight: 600; font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="banner">Clarity Focus Mode Active. Stay on this screen.</div>

    <div class="container animate-in">
        <div class="task-title" id="t-title">Focused Session</div>
        <div class="timer" id="timer">00:00</div>
        
        <div style="display: flex; gap: 16px; justify-content: center;">
            <button class="btn btn-primary" id="btn-toggle" onclick="toggle()">Start Focus</button>
            <button class="btn btn-outline" style="color:white; border-color:var(--text-muted);" onclick="finish()">Finish Task</button>
        </div>

        <div class="quote">"Small steps every day are better than a giant leap right before the deadline."</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const taskId = urlParams.get('task_id');
        const title = urlParams.get('title') || 'Focused Session';
        document.getElementById('t-title').textContent = title;

        let interval;
        let secs = 0;
        let active = false;

        function update() {
            const m = Math.floor(secs / 60).toString().padStart(2, '0');
            const s = (secs % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${m}:${s}`;
        }

        function toggle() {
            if(active) {
                clearInterval(interval);
                document.getElementById('btn-toggle').textContent = 'Resume Focus';
            } else {
                interval = setInterval(() => { secs++; update(); }, 1000);
                document.getElementById('btn-toggle').textContent = 'Pause';
            }
            active = !active;
        }

        async function finish() {
            clearInterval(interval);
            const mins = Math.ceil(secs / 60) || 1;
            try {
                await fetch('/api/focus_session', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ task_id: taskId, duration_mins: mins })
                });
                window.location.href = '/dashboard';
            } catch(e) {
                console.error(e);
                window.location.href = '/dashboard';
            }
        }
    </script>
</body>
</html>
